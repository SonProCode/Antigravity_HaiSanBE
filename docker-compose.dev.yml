version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: haisan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: haisan_db
      POSTGRES_USER: haisan
      POSTGRES_PASSWORD: haisan_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haisan"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: haisan_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: haisan_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

volumes:
  postgres_data:
